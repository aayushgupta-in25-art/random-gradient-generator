<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient-Generator</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <header>
        <div class="title-container">
            <h1>Gradient Generator</h1>
            <p>Create Beautiful CSS Gradients Instantly</p>
        </div>
    </header>
    <section>
        <div>
            <button id="myButton">#051937</button>
            <button id="myButton2">#008793</button>
        </div>
        <h2 id="copyText">Click the Code Block to Copy CSS</h2>
        <div class="css-code">
            <h3>CSS</h3>
            <hr>
            <div class="copyCode">
                background-image: linear-gradient(to right, #051937, #008793)
            </div>
        </div> 
    </section>            

    <script src="gradient.js"></script>
</body>
</html>
